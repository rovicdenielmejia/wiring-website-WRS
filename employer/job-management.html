<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Manage your job postings - create, edit, close. WRS Employer Portal.">
    <title>Job Management | WRS Employer Portal</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/styles-portal.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .jobs-list { list-style: none; padding: 0; margin: 0; }
        .jobs-list li { background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 0.75rem; }
        .jobs-list li.closed { opacity: 0.75; }
        .job-info { flex: 1; min-width: 200px; }
        .job-info h4 { margin: 0 0 0.25rem; font-size: 1.05rem; }
        .job-meta { font-size: 0.9rem; color: var(--text-light); }
        .job-status { font-size: 0.8rem; font-weight: 600; padding: 0.2rem 0.5rem; border-radius: 6px; }
        .job-status.open { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .job-status.closed { background: rgba(100, 116, 139, 0.3); color: var(--text-light); }
        .job-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .job-actions button { padding: 0.4rem 0.75rem; font-size: 0.9rem; border-radius: 8px; cursor: pointer; border: 1px solid var(--border-subtle); background: var(--bg-surface); color: var(--text-primary); }
        .job-actions button:hover { border-color: var(--accent-red); color: var(--accent-red); }
        .job-actions button.close-btn { border-color: var(--text-light); color: var(--text-light); }
        .job-actions button.close-btn:hover { border-color: var(--accent-red); color: var(--accent-red); }
        .add-job-card { margin-bottom: 1.5rem; }
        .form-row { margin-bottom: 1rem; }
        .form-row label { display: block; margin-bottom: 0.35rem; font-weight: 500; }
        .form-row input, .form-row textarea { width: 100%; max-width: 400px; padding: 0.5rem 0.75rem; border-radius: 8px; border: 1px solid var(--border-subtle); background: var(--bg-surface); color: var(--text-primary); }
        .form-row textarea { min-height: 80px; resize: vertical; }
        .edit-form { display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-subtle); }
        .edit-form.open { display: block; }
        .jobs-empty { color: var(--text-secondary); padding: 2rem; text-align: center; }
    </style>
</head>
<body>
    <header>
        <nav class="navbar" aria-label="Main navigation">
            <div class="container">
                <div class="nav-brand">
                    <h1><a href="employer-dashboard.html" class="nav-brand-link">
                        <img src="../Assets/WRS LOGO.png" alt="Workforce Recruitment Solutions" class="nav-logo">
                        <span class="nav-brand-title">WRS Employer Portal</span>
                    </a></h1>
                </div>
                <ul class="nav-menu">
                    <li><a href="employer-dashboard.html">Dashboard</a></li>
                    <li><a href="job-management.html" class="active">Job Management</a></li>
                    <li><a href="../home.html">Home</a></li>
                    <li><a href="../book-consultation.html">Request Dedicated Recruiter</a></li>
                    <li><a href="#" id="employer-logout">Logout</a></li>
                </ul>
                <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </nav>
    </header>

    <main id="main-content" class="portal-dashboard">
        <div class="portal-sidebar">
            <ul>
                <li><a href="employer-dashboard.html">📊 Dashboard</a></li>
                <li><a href="job-management.html" class="active">📝 Job Management</a></li>
                <li><a href="../jobs.html">🔍 Browse Jobs (public)</a></li>
            </ul>
        </div>
        <div class="portal-main">
            <div class="dashboard-header">
                <h1>Job Management</h1>
                <p class="dashboard-welcome">Create, edit, and close your job postings.</p>
            </div>

            <section class="dashboard-section">
                <div class="dashboard-card add-job-card">
                    <h3>Add a job</h3>
                    <form id="add-job-form">
                        <div class="form-row">
                            <label for="new-title">Job title *</label>
                            <input type="text" id="new-title" name="title" required placeholder="e.g. Senior Developer">
                        </div>
                        <div class="form-row">
                            <label for="new-location">Location</label>
                            <input type="text" id="new-location" name="location" placeholder="e.g. Manila, Remote">
                        </div>
                        <div class="form-row">
                            <label for="new-description">Description</label>
                            <textarea id="new-description" name="description" placeholder="Requirements, responsibilities..."></textarea>
                        </div>
                        <div id="add-job-error" class="form-message" style="color: var(--accent-red); display: none; margin-bottom: 0.5rem;"></div>
                        <button type="submit" class="cta-button">Add job</button>
                    </form>
                </div>

                <div class="dashboard-card">
                    <h3>Your job postings</h3>
                    <div id="jobs-container">
                        <p class="jobs-empty" id="jobs-loading">Loading...</p>
                        <ul class="jobs-list" id="jobs-list" style="display: none;"></ul>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/jobs.js"></script>
    <script src="../js/script.js"></script>
    <script>
        (function () {
            var session = requireRole(['employer'], 'employer-login.html');
            if (!session) return;

            document.getElementById('employer-logout').addEventListener('click', function (e) {
                e.preventDefault();
                logout();
            });

            var listEl = document.getElementById('jobs-list');
            var loadingEl = document.getElementById('jobs-loading');

            function escapeHtml(s) {
                return String(s).replace(/[&<>"']/g, function (c) {
                    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
                });
            }

            function renderJobs(jobs) {
                loadingEl.style.display = 'none';
                listEl.style.display = 'block';
                listEl.innerHTML = '';
                if (jobs.length === 0) {
                    listEl.innerHTML = '<p class="jobs-empty">No jobs yet. Add one above.</p>';
                    return;
                }
                jobs.forEach(function (job) {
                    var li = document.createElement('li');
                    if (job.status === 'closed') li.classList.add('closed');
                    var desc = job.description ? escapeHtml(job.description).slice(0, 120) + (job.description.length > 120 ? '…' : '') : '';
                    li.innerHTML =
                        '<div class="job-info">' +
                        '<h4>' + escapeHtml(job.title) + '</h4>' +
                        '<p class="job-meta">' + escapeHtml(job.location || '—') + (job.created_at ? ' · ' + new Date(job.created_at).toLocaleDateString() : '') + '</p>' +
                        (desc ? '<p class="job-meta">' + desc + '</p>' : '') +
                        '<span class="job-status ' + escapeHtml(job.status) + '">' + escapeHtml(job.status) + '</span>' +
                        '</div>' +
                        '<div class="job-actions">' +
                        (job.status === 'open' ? '<button type="button" class="edit-btn" data-id="' + escapeHtml(job.id) + '">Edit</button>' : '') +
                        (job.status === 'open' ? '<button type="button" class="close-btn" data-id="' + escapeHtml(job.id) + '">Close</button>' : '') +
                        '</div>';
                    listEl.appendChild(li);

                    if (job.status === 'open') {
                        li.querySelector('.edit-btn').addEventListener('click', function () {
                            showEditForm(job);
                        });
                        li.querySelector('.close-btn').addEventListener('click', function () {
                            setClose(job.id);
                        });
                    }
                });
            }

            function showEditForm(job) {
                var existing = document.getElementById('edit-job-form-wrap');
                if (existing) existing.remove();
                var wrap = document.createElement('div');
                wrap.id = 'edit-job-form-wrap';
                wrap.className = 'dashboard-card';
                wrap.innerHTML =
                    '<h3>Edit: ' + escapeHtml(job.title) + '</h3>' +
                    '<form id="edit-job-form" class="edit-form open">' +
                    '<input type="hidden" name="id" value="' + escapeHtml(job.id) + '">' +
                    '<div class="form-row"><label>Job title *</label><input type="text" name="title" value="' + escapeHtml(job.title) + '" required></div>' +
                    '<div class="form-row"><label>Location</label><input type="text" name="location" value="' + escapeHtml(job.location || '') + '"></div>' +
                    '<div class="form-row"><label>Description</label><textarea name="description">' + escapeHtml(job.description || '') + '</textarea></div>' +
                    '<div id="edit-job-error" class="form-message" style="color: var(--accent-red); display: none; margin-bottom: 0.5rem;"></div>' +
                    '<button type="submit" class="cta-button">Save</button> <button type="button" id="edit-cancel" class="cta-button cta-button--outline">Cancel</button>' +
                    '</form>';
                listEl.closest('.dashboard-section').insertBefore(wrap, listEl.closest('.dashboard-card'));
                document.getElementById('edit-job-form').addEventListener('submit', function (e) {
                    e.preventDefault();
                    saveEdit(job.id);
                });
                document.getElementById('edit-cancel').addEventListener('click', function () {
                    wrap.remove();
                });
            }

            function saveEdit(jobId) {
                var form = document.getElementById('edit-job-form');
                if (!form) return;
                var errEl = document.getElementById('edit-job-error');
                var title = form.querySelector('[name="title"]').value.trim();
                var location = form.querySelector('[name="location"]').value.trim();
                var description = form.querySelector('[name="description"]').value.trim();
                if (!title) { errEl.textContent = 'Title is required.'; errEl.style.display = 'block'; return; }
                errEl.style.display = 'none';
                updateJob(session.id, jobId, { title: title, location: location, description: description }).then(function (result) {
                    if (result.success) {
                        document.getElementById('edit-job-form-wrap').remove();
                        loadJobs();
                    } else {
                        errEl.textContent = result.error || 'Update failed.';
                        errEl.style.display = 'block';
                    }
                });
            }

            function setClose(jobId) {
                if (!confirm('Close this job posting? It will no longer appear as open.')) return;
                updateJob(session.id, jobId, { status: 'closed' }).then(function (result) {
                    if (result.success) loadJobs();
                });
            }

            function loadJobs() {
                getJobs(session.id).then(renderJobs);
            }

            document.getElementById('add-job-form').addEventListener('submit', function (e) {
                e.preventDefault();
                var errEl = document.getElementById('add-job-error');
                var title = document.getElementById('new-title').value.trim();
                var location = document.getElementById('new-location').value.trim();
                var description = document.getElementById('new-description').value.trim();
                if (!title) { errEl.textContent = 'Title is required.'; errEl.style.display = 'block'; return; }
                errEl.style.display = 'none';
                createJob(session.id, { title: title, location: location, description: description }).then(function (result) {
                    if (result.success) {
                        document.getElementById('new-title').value = '';
                        document.getElementById('new-location').value = '';
                        document.getElementById('new-description').value = '';
                        loadJobs();
                    } else {
                        errEl.textContent = result.error || 'Failed to add job.';
                        errEl.style.display = 'block';
                    }
                });
            });

            loadJobs();
        })();
    </script>
</body>
</html>
